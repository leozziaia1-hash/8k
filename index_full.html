<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agentic AI Orchestration System - Alioth</title>
    <script>
      window.addEventListener("error", function (e) {
        if (e.error) {
          console.error("Detailed Error: ", e.error.stack);
        } else {
          console.error("Detailed Error: ", e.message);
        }
      });
    </script>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #050510;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: white;
        user-select: none;
      }
      #canvas-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1;
      }
      #ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 2;
      }
      .panel {
        position: absolute;
        top: 2rem;
        left: 2rem;
        background: rgba(5, 5, 16, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(0, 255, 255, 0.2);
        padding: 1.5rem;
        border-radius: 12px;
        pointer-events: auto;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
      }
      h1 {
        margin: 0 0 0.5rem 0;
        font-size: 1.25rem;
        font-weight: 300;
        letter-spacing: 0.1em;
        color: rgba(255, 255, 255, 0.9);
      }
      p.subtitle {
        margin: 0 0 1.5rem 0;
        font-size: 0.85rem;
        color: #00ffff;
        opacity: 0.8;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      button {
        background: transparent;
        color: #00ffff;
        border: 1px solid #00ffff;
        padding: 0.75rem 1.5rem;
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        cursor: pointer;
        transition: all 0.3s ease;
        border-radius: 4px;
        text-transform: uppercase;
        position: relative;
        overflow: hidden;
      }
      button::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(0, 255, 255, 0.2),
          transparent
        );
        transition: left 0.5s ease;
      }
      button:hover::before {
        left: 100%;
      }
      button:hover {
        background: rgba(0, 255, 255, 0.1);
        box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
      }
      button:active {
        transform: scale(0.98);
      }
      .layout-btn {
        border-color: #aa00ff;
        color: #aa00ff;
      }
      .layout-btn::before {
        background: linear-gradient(
          90deg,
          transparent,
          rgba(170, 0, 255, 0.2),
          transparent
        );
      }
      .layout-btn:hover {
        background: rgba(170, 0, 255, 0.1);
        box-shadow: 0 0 15px rgba(170, 0, 255, 0.3);
      }
      #collapse-btn::before {
        display: none !important;
      }
      #collapse-btn:hover {
        box-shadow: none !important;
        background: rgba(255, 255, 255, 0.15) !important;
      }
      .light-control {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
        padding-top: 0.75rem;
        border-top: 1px solid rgba(0, 255, 255, 0.2);
      }
      .light-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .light-header label {
        font-size: 0.75rem;
        color: #00ffff;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        opacity: 0.8;
        margin: 0;
        cursor: pointer;
      }
      .toggle-switch {
        position: relative;
        display: inline-block;
        width: 30px;
        height: 16px;
      }
      .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .toggle-slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: rgba(0, 255, 255, 0.1);
        transition: 0.4s;
        border-radius: 16px;
        border: 1px solid rgba(0, 255, 255, 0.3);
      }
      .toggle-slider:before {
        position: absolute;
        content: "";
        height: 12px;
        width: 12px;
        left: 1px;
        bottom: 1px;
        background-color: #00ffff;
        transition: 0.4s;
        border-radius: 50%;
      }
      input:checked + .toggle-slider {
        background-color: rgba(0, 255, 255, 0.4);
      }
      input:checked + .toggle-slider:before {
        transform: translateX(14px);
      }
      .slider-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        margin-top: 0.25rem;
      }
      .slider-group input[type="range"] {
        -webkit-appearance: none;
        width: 100%;
        background: rgba(0, 255, 255, 0.1);
        height: 4px;
        border-radius: 2px;
        outline: none;
        box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5);
      }
      .slider-group input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #00ffff;
        cursor: pointer;
        box-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        transition: transform 0.1s;
      }
      .slider-group input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.2);
      }
      .node-label {
        position: absolute;
        color: rgba(255, 255, 255, 0.9);
        font-size: 0.65rem;
        pointer-events: none;
        transform: translate(-50%, -50%);
        text-transform: uppercase;
        letter-spacing: 0.15em;
        font-weight: 600;
        background: rgba(10, 20, 30, 0.6);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        padding: 4px 8px;
        border: 1px solid rgba(0, 255, 255, 0.3);
        border-radius: 4px;
        box-shadow: 0 0 10px rgba(0, 255, 255, 0.1);
        transition:
          opacity 0.3s,
          color 0.3s;
        opacity: 0.8;
        white-space: nowrap;
        z-index: 5;
        will-change: transform;
      }
      #legend-container {
        position: absolute;
        bottom: 2rem;
        right: 2rem;
        width: 250px;
        background: rgba(10, 15, 25, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(0, 255, 255, 0.2);
        border-radius: 8px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        z-index: 20;
        pointer-events: auto;
        color: rgba(255, 255, 255, 0.9);
        overflow: hidden;
      }
      .legend-header {
        padding: 12px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(0, 255, 255, 0.1);
        border-bottom: 1px solid rgba(0, 255, 255, 0.2);
        cursor: pointer;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-weight: 600;
        pointer-events: auto;
      }
      .legend-header:hover {
        background: rgba(0, 255, 255, 0.2);
      }
      .legend-content {
        padding: 12px 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 400px;
        overflow-y: auto;
        transition:
          max-height 0.4s cubic-bezier(0, 1, 0, 1),
          padding 0.4s ease,
          opacity 0.3s ease;
        opacity: 1;
      }
      .legend-item {
        display: flex;
        align-items: center;
        font-size: 0.75rem;
        letter-spacing: 0.05em;
      }
      .legend-item-tag {
        display: inline-block;
        background: rgba(0, 255, 255, 0.15);
        border: 1px solid rgba(0, 255, 255, 0.4);
        padding: 2px 6px;
        border-radius: 4px;
        color: #00ffff;
        font-weight: 700;
        width: 35px;
        text-align: center;
        margin-right: 12px;
        flex-shrink: 0;
      }
      .legend-item-name {
        color: rgba(255, 255, 255, 0.7);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #legend-container.collapsed .legend-content {
        max-height: 0;
        padding-top: 0;
        padding-bottom: 0;
        opacity: 0;
        pointer-events: none;
      }
      #legend-container.collapsed .legend-icon {
        transform: rotate(180deg);
      }
      .legend-icon {
        transition: transform 0.3s ease;
      }
      #tooltip {
        position: absolute;
        background: rgba(20, 5, 30, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(200, 50, 255, 0.4);
        padding: 0.5rem 1rem;
        border-radius: 6px;
        font-size: 0.85rem;
        font-weight: 500;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        transform: translate(-50%, -150%);
        color: #e0b0ff;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        z-index: 10;
        white-space: nowrap;
      }
    </style>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="canvas-container"></div>
    <div
      id="labels-container"
      style="
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 5;
      "
    ></div>
    <div id="ui-layer">
      <div class="panel">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
          "
        >
          <h1 style="margin: 0; margin-right: 2rem">Sistema Alioth</h1>
          <button
            id="collapse-btn"
            style="
              padding: 0.5rem;
              border: none;
              background: transparent;
              box-shadow: none;
              border-radius: 8px;
              color: white;
              display: flex;
              align-items: center;
              justify-content: center;
              cursor: pointer;
              transition: background 0.3s ease;
            "
            onmouseover="this.style.background = 'rgba(255,255,255,0.1)'"
            onmouseout="this.style.background = 'transparent'"
          >
            <svg
              id="collapse-icon"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="rgba(255,255,255,0.8)"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              style="
                transition: transform 0.4s
                  cubic-bezier(0.175, 0.885, 0.32, 1.275);
                display: block;
              "
            >
              <polyline points="18 15 12 9 6 15"></polyline>
            </svg>
          </button>
        </div>
        <div
          id="panel-content"
          style="transition: opacity 0.2s ease; opacity: 1"
        >
          <p class="subtitle" style="margin-top: 0">
            Orquestación de IA Agéntica
          </p>
          <div style="display: flex; flex-direction: column; gap: 0.75rem">
            <button id="exec-btn">EJECUTAR PROTOCOLO</button>
            <button id="layout-btn" class="layout-btn">VISTA: PIRAMIDAL</button>
            <div class="light-control">
              <div class="light-header">
                <label>Lámpara Habitación</label>
                <label class="toggle-switch">
                  <input type="checkbox" id="room-light-toggle" checked />
                  <span class="toggle-slider"></span>
                </label>
              </div>
              <div class="slider-group">
                <input
                  type="range"
                  id="room-light-slider"
                  min="0"
                  max="100"
                  step="1"
                  value="100"
                />
              </div>
            </div>
          </div>
        </div>
      </div>
      <div id="legend-container" class="collapsed">
        <div class="legend-header" id="legend-header">
          <span>Directorio de Nodos</span>
          <svg
            class="legend-icon"
            width="12"
            height="12"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </div>
        <div class="legend-content" id="legend-content"></div>
      </div>
      <div id="tooltip"></div>
    </div>

    <script>
      try {
        // === CORE ===
        const container = document.getElementById("canvas-container");
        const tooltip = document.getElementById("tooltip");
        const execBtn = document.getElementById("exec-btn");
        const layoutBtn = document.getElementById("layout-btn");
        const roomLightToggle = document.getElementById("room-light-toggle");
        const roomLightSlider = document.getElementById("room-light-slider");
        const labelsContainer = document.getElementById("labels-container");
        const collapseBtn = document.getElementById("collapse-btn");
        const panelContent = document.getElementById("panel-content");
        const legendContainer = document.getElementById("legend-container");
        const legendHeader = document.getElementById("legend-header");

        legendHeader.addEventListener("click", () => {
          legendContainer.classList.toggle("collapsed");
        });

        let isPanelCollapsed = false;
        const collapseIcon = document.getElementById("collapse-icon");
        collapseBtn.addEventListener("click", () => {
          isPanelCollapsed = !isPanelCollapsed;
          if (isPanelCollapsed) {
            panelContent.style.opacity = "0";
            setTimeout(() => {
              panelContent.style.display = "none";
            }, 200);
            collapseIcon.style.transform = "rotate(180deg)";
          } else {
            panelContent.style.display = "block";
            setTimeout(() => {
              panelContent.style.opacity = "1";
            }, 10);
            collapseIcon.style.transform = "rotate(0deg)";
          }
        });

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a0a0f, 0.002);

        const camera = new THREE.PerspectiveCamera(
          45,
          window.innerWidth / window.innerHeight,
          0.1,
          1000,
        );
        camera.position.set(0, 15, 160);

        const renderer = new THREE.WebGLRenderer({
          antialias: true,
          alpha: true,
          powerPreference: "high-performance",
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 25);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 600; // Increased to allow free navigation in the room
        controls.minDistance = 5;
        controls.maxPolarAngle = Math.PI; // Full vertical freedom

        scene.add(new THREE.AmbientLight(0xffffff, 0.2));

        // === ORCHESTRATION GROUP ===
        const orchestrationGroup = new THREE.Group();
        orchestrationGroup.position.set(0, 0, 25); // Move everything away from the desk
        orchestrationGroup.scale.set(2.4, 2.4, 2.4); // Increase proportional size
        scene.add(orchestrationGroup);

        // === REALISTIC ENVIRONMENT: OFFICE ROOM ===
        const roomGroup = new THREE.Group();
        // Shift entire room so the desk is completely behind the visualization system
        roomGroup.position.set(0, -45, -20);
        scene.add(roomGroup);

        // 1. Floor & Walls
        // Floor
        const floorGeom = new THREE.PlaneBufferGeometry(600, 600);
        const floorMat = new THREE.MeshStandardMaterial({
          color: 0x2a2520,
          roughness: 0.9,
          metalness: 0.1,
        });
        const floorRoom = new THREE.Mesh(floorGeom, floorMat);
        floorRoom.rotation.x = -Math.PI / 2;
        floorRoom.position.y = -35;
        roomGroup.add(floorRoom);

        // Walls
        const wallBackGeom = new THREE.PlaneBufferGeometry(600, 200);
        const wallMat = new THREE.MeshStandardMaterial({
          color: 0xdddddd,
          roughness: 1.0,
        });
        const wallBack = new THREE.Mesh(wallBackGeom, wallMat);
        wallBack.position.set(0, 65, -200);
        roomGroup.add(wallBack);

        const wallLeft = new THREE.Mesh(wallBackGeom, wallMat);
        wallLeft.rotation.y = Math.PI / 2;
        wallLeft.position.set(-300, 65, 50);
        roomGroup.add(wallLeft);

        const wallRight = new THREE.Mesh(wallBackGeom, wallMat);
        wallRight.rotation.y = -Math.PI / 2;
        wallRight.position.set(300, 65, 50);
        roomGroup.add(wallRight);

        // === 1.1 Front Wall & Hyper-Realistic Door ===
        // Front Wall (Behind Camera)
        const wallFront = new THREE.Mesh(wallBackGeom, wallMat);
        wallFront.rotation.y = Math.PI;
        wallFront.position.set(0, 65, 350);
        roomGroup.add(wallFront);

        // Hyper-Realistic Door
        const doorGroup = new THREE.Group();
        // On the front wall, resting on floor (-35)
        doorGroup.position.set(0, -35, 349.5);
        // Face towards the center of the room (-z)
        doorGroup.rotation.y = Math.PI;
        roomGroup.add(doorGroup);

        // Deep rich wooden material
        const woodMat = new THREE.MeshStandardMaterial({
          color: 0x241107,
          roughness: 0.65,
          metalness: 0.05,
        });
        // A more glossy dark variant for frame
        const doorFrameMat = new THREE.MeshStandardMaterial({
          color: 0x140a05,
          roughness: 0.4,
        });

        // Frame Left/Right/Top
        const dFrameLeft = new THREE.Mesh(
          new THREE.BoxBufferGeometry(4, 90, 6),
          doorFrameMat,
        );
        dFrameLeft.position.set(-22, 45, 0);
        doorGroup.add(dFrameLeft);

        const dFrameRight = new THREE.Mesh(
          new THREE.BoxBufferGeometry(4, 90, 6),
          doorFrameMat,
        );
        dFrameRight.position.set(22, 45, 0);
        doorGroup.add(dFrameRight);

        const dFrameTop = new THREE.Mesh(
          new THREE.BoxBufferGeometry(48, 4, 6),
          doorFrameMat,
        );
        dFrameTop.position.set(0, 92, 0);
        doorGroup.add(dFrameTop);

        // Main Door Panel
        const doorPanel = new THREE.Mesh(
          new THREE.BoxBufferGeometry(40, 90, 2),
          woodMat,
        );
        doorPanel.position.set(0, 45, 0);
        doorGroup.add(doorPanel);

        // Elaborate panels for depth
        const insetDark = new THREE.MeshStandardMaterial({
          color: 0x180b04,
          roughness: 0.7,
          metalness: 0.02,
        });
        // 4-panel classic design details
        const panelPositions = [
          { y: 70, h: 30 },
          { y: 25, h: 40 },
        ];
        panelPositions.forEach((p) => {
          const outerP = new THREE.Mesh(
            new THREE.BoxBufferGeometry(28, p.h, 2.5),
            woodMat,
          );
          outerP.position.set(0, p.y, 0);
          doorGroup.add(outerP);

          const innerP = new THREE.Mesh(
            new THREE.BoxBufferGeometry(24, p.h - 4, 2.8),
            insetDark,
          );
          innerP.position.set(0, p.y, 0);
          doorGroup.add(innerP);
        });

        // Hyper-Realistic Metallic Handle & Lock
        const handleGroup = new THREE.Group();
        handleGroup.position.set(15, 45, 1.25); // Set handle on the right side of door
        doorGroup.add(handleGroup);

        const hMetalMat = new THREE.MeshPhysicalMaterial({
          color: 0xe0e0e0,
          metalness: 0.9,
          roughness: 0.2,
          clearcoat: 1.0,
          clearcoatRoughness: 0.1,
        });

        // Base plate
        const basePlate = new THREE.Mesh(
          new THREE.BoxBufferGeometry(3, 10, 0.4),
          hMetalMat,
        );
        basePlate.position.set(0, 0, 0);
        handleGroup.add(basePlate);

        // Keyhole (Real cutout illusion)
        const keyHoleMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const keyHole = new THREE.Mesh(
          new THREE.CylinderBufferGeometry(0.3, 0.3, 0.6, 16),
          keyHoleMat,
        );
        keyHole.rotation.x = Math.PI / 2;
        keyHole.position.set(0, -3, 0.2);
        handleGroup.add(keyHole);
        const keySlot = new THREE.Mesh(
          new THREE.BoxBufferGeometry(0.3, 0.8, 0.6),
          keyHoleMat,
        );
        keySlot.position.set(0, -3.4, 0.2);
        handleGroup.add(keySlot);

        // Handle shaft
        const hShaft = new THREE.Mesh(
          new THREE.CylinderBufferGeometry(0.4, 0.5, 2, 16),
          hMetalMat,
        );
        hShaft.rotation.x = Math.PI / 2;
        hShaft.position.set(0, 2, 1);
        handleGroup.add(hShaft);

        // Handle lever (curved elegant)
        const hLever = new THREE.Mesh(
          new THREE.CylinderBufferGeometry(0.4, 0.3, 8, 16),
          hMetalMat,
        );
        hLever.rotation.z = Math.PI / 2;
        hLever.position.set(-3.5, 2, 1.8);
        handleGroup.add(hLever);

        // Handle end curve
        const hEnd = new THREE.Mesh(
          new THREE.SphereBufferGeometry(0.4, 16, 16),
          hMetalMat,
        );
        hEnd.position.set(-7.5, 2, 1.8);
        handleGroup.add(hEnd);

        // Dedicated Door Highlight (brings out metal/wood texture)
        const doorLight = new THREE.PointLight(0xffeedd, 0.6, 120);
        doorLight.position.set(0, 50, 310);
        roomGroup.add(doorLight);

        // === 1.2 Tall Potted Plants (Front Wall Corners) ===
        function createTallPlant() {
          const plantContainer = new THREE.Group();

          // Elegant tall matte ceramic pot with a bit of a curve
          const potGeom = new THREE.CylinderBufferGeometry(7, 5, 22, 64);
          const potMat = new THREE.MeshStandardMaterial({
            color: 0x1f2326, // Very dark modern grey
            roughness: 0.8,
            metalness: 0.1,
          });
          const pot = new THREE.Mesh(potGeom, potMat);
          pot.position.y = 11; // Half of 22
          plantContainer.add(pot);

          // Soil
          const soilGeom = new THREE.CylinderBufferGeometry(6.8, 6.8, 0.5, 32);
          const soilMat = new THREE.MeshStandardMaterial({
            color: 0x110804,
            roughness: 1.0,
          });
          const soil = new THREE.Mesh(soilGeom, soilMat);
          soil.position.y = 21.5;
          plantContainer.add(soil);

          // Lush Parametric Palm (Areca / Kentia Palm style)
          // We will create several sweeping fronds emitting from the center.
          const frondCount = 28; // very lush
          const leafColor1 = new THREE.Color(0x284022); // Deep green
          const leafColor2 = new THREE.Color(0x4a7a37); // Lighter green
          const stemMat = new THREE.MeshStandardMaterial({
            color: 0x3d5c2c,
            roughness: 0.6,
          });

          // Pre-create leaflet geometries to save memory
          // A leaflet is an elongated curved shape. We will use a scaled sphere or box.
          // Or simply a BoxBufferGeometry rotated, which looks good if dense.
          const leafletGeom = new THREE.BoxBufferGeometry(0.3, 0.05, 1);
          leafletGeom.translate(0, 0, 0.5); // Pivot at the base

          for (let i = 0; i < frondCount; i++) {
            const frondGroup = new THREE.Group();

            // Randomize frond parameters
            const angle =

              21.5 + length * (1.0 - arc * 0.4),
              Math.sin(angle) * (length * arc),

              endPt,

              12,
              0.25,
              6,
              false,

              roughness: 0.5,
              metalness: 0.1,
              side: THREE.DoubleSide,

            for (let j = 0; j < numLeaflets; j++) {
              const t = 0.2 + (0.8 * j) / numLeaflets; // from 20% to 100% of the stem
              const pos = stemCurve.getPoint(t);
              const tangent = stemCurve.getTangent(t).normalize();

              // A simple way is to cross the tangent with an "up" vector, though tangent itself might point up.
              // Let's create a local basis.
              const up = new THREE.Vector3(0, 1, 0);
              let right = new THREE.Vector3().crossVectors(tangent, up);
              if (right.lengthSq() < 0.001) {

        // === AURA SHADERS ===

            varying vec2 vUv;

            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec3 vPosition;

            void main() {
                float rim = pow(1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0))), 2.0);
                float band = sin(vPosition.y * 10.0 - uTime * 4.0);
                float bandMask = smoothstep(0.8, 1.0, band);
                
                float noise = fract(sin(dot(floor(vUv * 50.0), vec2(12.9898, 78.233))) * 43758.5453);

                float equator = smoothstep(0.05, 0.0, abs(vPosition.y));
                float eqPulse = (0.5 + 0.5 * sin(uTime * 8.0)) * equator;

                float finalAlpha = (rim * 0.4 + bandMask * 0.6 + noise + eqPulse) * uActivation;
                finalAlpha *= smoothstep(0.0, 0.5, rim);

                gl_FragColor = vec4(uColor + (eqPulse * vec3(1.0)), finalAlpha * 0.8);

        const auraGeometry = new THREE.SphereBufferGeometry(2.5, 32, 32);

        const primitives = [

        // === ANALYTIC SHADERS ===
        const analyticVertexShader = `
            varying vec2 vUv;
            varying vec3 vPosition;
            varying vec3 vNormal;
            void main() {
                vUv = uv;
                vPosition = position;
                vNormal = normalize(normalMatrix * normal);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const analyticFragmentShader = `
            uniform float uTime;
            uniform float uActivation;
            uniform float uPulse;
            varying vec2 vUv;
            varying vec3 vPosition;
            varying vec3 vNormal;

            void main() {
                float scan = fract(vPosition.y * 3.0 - uTime * 1.5);
                float scanLine = smoothstep(0.48, 0.5, scan) * smoothstep(0.52, 0.5, scan);
                
                float rim = pow(1.0 - max(0.0, dot(vNormal, vec3(0.0, 0.0, 1.0))), 2.0);
                
                vec3 baseColor = vec3(0.0, 0.4, 0.8);
                vec3 activeColor = vec3(0.0, 1.0, 1.0);
                vec3 color = mix(baseColor, activeColor, uActivation + uPulse);
                
                color += scanLine * vec3(0.5, 1.0, 1.0) * (0.8 + uActivation);
                
                float alpha = 0.5 + rim * 0.4 + uActivation * 0.4;
                
                gl_FragColor = vec4(color, alpha);

        // === AUDITOR SHADERS ===
        const auditorBeamVertexShader = `

                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);

        const auditorBeamFragmentShader = `
            uniform float uTime;
            uniform float uActivation;
            varying vec2 vUv;

            void main() {
                float depth = vUv.y; 
                float fade = smoothstep(0.0, 0.4, depth); 
                
                float stripes = fract(depth * 15.0 - uTime * 3.0);
                float line = smoothstep(0.4, 0.6, stripes) * smoothstep(0.8, 0.6, stripes);
                
                float noise = fract(sin(dot(vUv, vec2(12.9898, 78.233)) + uTime) * 43758.5453);
                
                vec3 baseCol = vec3(0.1, 0.9, 0.4); 
                vec3 activeCol = vec3(1.0, 0.8, 0.1); 
                vec3 finalCol = mix(baseCol, activeCol, uActivation);
                
                float alpha = fade * (0.1 + line * 0.3 + noise * 0.1) * (0.3 + uActivation * 0.7);
                
                gl_FragColor = vec4(finalCol, alpha);
            }
        `;

        const auditorDiskFragmentShader = `
            uniform float uTime;
            uniform float uActivation;
            varying vec2 vUv;

                vec2 pc = vUv - 0.5;
                float dist = length(pc) * 2.0; 
                if (dist > 1.0) discard;
                
                float rings = fract(dist * 6.0 - uTime * 2.0);
                float rAlpha = smoothstep(0.8, 1.0, rings);
                
                float angle = atan(pc.y, pc.x);
                float sweep = smoothstep(0.0, 0.15, fract(angle / 6.2831 + uTime * 3.0));
                
                vec3 col = mix(vec3(0.1, 0.9, 0.4), vec3(1.0, 0.8, 0.1), uActivation);

          } else if (i === 3) {

            const coreMat = new THREE.MeshStandardMaterial({

            uniform vec3 uStart;
            uniform vec3 uEnd;
            uniform vec3 uControl1;
            uniform vec3 uControl2;

            varying vec2 vUv;
            varying float vProgress;

            vec3 getBezier(float t) {
                float u = 1.0 - t;
                float tt = t * t;
                float uu = u * u;
                float uuu = uu * u;
                float ttt = tt * t;

                vec3 p = uuu * uStart;
                p += 3.0 * uu * t * uControl1;
                p += 3.0 * u * tt * uControl2;
                p += ttt * uEnd;
                return p;
            }

            vec3 getDerivative(float t) {
                float u = 1.0 - t;
                vec3 p = 3.0 * u * u * (uControl1 - uStart);
                p += 6.0 * u * t * (uControl2 - uControl1);
                p += 3.0 * t * t * (uEnd - uControl2);
                return p;
            }

            void main() {
                vUv = uv;
                float t = position.y + 0.5;
                vProgress = t;

                vec3 pos = getBezier(t);
                vec3 tangent = normalize(getDerivative(t));
                
                vec3 up = vec3(0.0, 1.0, 0.0);
                if (abs(dot(up, tangent)) > 0.99) {
                    up = vec3(1.0, 0.0, 0.0);
                }
                vec3 right = normalize(cross(up, tangent));
                vec3 normal = cross(tangent, right);

                vec3 finalPos = pos + right * position.x + normal * position.z;

                gl_Position = projectionMatrix * modelViewMatrix * vec4(finalPos, 1.0);
            }
        `;

                    discard;

                float intensity = 1.0 - (distToHead / tailLength);
                intensity = pow(intensity, 1.5); 
                
                float dataPattern = fract(vProgress * 50.0 - uTime * 6.0);
                float glow = smoothstep(0.6, 1.0, dataPattern);
                
                vec3 finalColor = uColor + (vec3(1.0) * glow * 0.8);

        const _tempQuaternion = new THREE.Quaternion();
        const _targetQuaternion = new THREE.Quaternion();
        const _slerpQuaternion = new THREE.Quaternion();
        
        // Función SLERP optimizada para rotaciones suaves
        const slerpRotation = (object, targetRotation, factor) => {
          _targetQuaternion.setFromEuler(targetRotation);
          _slerpQuaternion.copy(object.quaternion).slerp(_targetQuaternion, factor);
          object.quaternion.copy(_slerpQuaternion);
        };

        // === 2. FÍSICA SPRING-MASS-DAMPER PARA MOVIMIENTOS NATURALES ===
        // Sistema masa-resorte-amortiguador para suavidad orgánica
        class SpringPhysics {
          constructor(position = 0, velocity = 0) {
            this.position = position;
            this.velocity = velocity;
            this.target = position;
          }
          
          update(dt, stiffness = 15.0, damping = 8.0, mass = 1.0) {
            // Ley de Hooke: F = -kx (fuerza del resorte)
            const springForce = -stiffness * (this.position - this.target);
            // Fuerza de amortiguamiento: F = -cv (resistencia al movimiento)
            const dampingForce = -damping * this.velocity;
            // Aceleración: a = F/m (segunda ley de Newton)
            const acceleration = (springForce + dampingForce) / mass;
            
            // Integración semi-implícita de Euler (más estable que Euler explícito)
            this.velocity += acceleration * dt;
            this.position += this.velocity * dt;
            
            return this.position;
          }
          
          setTarget(target) {
            this.target = target;
          }
        }

        // Pool de springs reutilizables para evitar GC
        const springPool = [];
        const getSpring = () => {
          if (springPool.length > 0) {
            const spring = springPool.pop();
            spring.position = 0;
            spring.velocity = 0;
            spring.target = 0;
            return spring;
          }
          return new SpringPhysics();
        };
        const releaseSpring = (spring) => springPool.push(spring);

        // === 3. CURVAS BÉZIER CÚBICAS PARA TRAYECTORIAS ELEGANTES ===
        // Evaluación optimizada de Bézier con derivadas para orientación
        const evaluateBezier = (t, p0, p1, p2, p3, out) => {
          const u = 1 - t;
          const uu = u * u;
          const uuu = uu * u;
          const tt = t * t;
          const ttt = tt * t;
          
          // B(t) = (1-t)³·P0 + 3(1-t)²·t·P1 + 3(1-t)·t²·P2 + t³·P3
          out.x = uuu * p0.x + 3 * uu * t * p1.x + 3 * u * tt * p2.x + ttt * p3.x;
          out.y = uuu * p0.y + 3 * uu * t * p1.y + 3 * u * tt * p2.y + ttt * p3.y;
          out.z = uuu * p0.z + 3 * uu * t * p1.z + 3 * u * tt * p2.z + ttt * p3.z;
          return out;
        };

        const evaluateBezierDerivative = (t, p0, p1, p2, p3, out) => {
          const u = 1 - t;
          const uu = u * u;
          const tt = t * t;
          
          // B'(t) = 3(1-t)²(P1-P0) + 6(1-t)t(P2-P1) + 3t²(P3-P2)
          out.x = 3 * uu * (p1.x - p0.x) + 6 * u * t * (p2.x - p1.x) + 3 * tt * (p3.x - p2.x);
          out.y = 3 * uu * (p1.y - p0.y) + 6 * u * t * (p2.y - p1.y) + 3 * tt * (p3.y - p2.y);
          out.z = 3 * uu * (p1.z - p0.z) + 6 * u * t * (p2.z - p1.z) + 3 * tt * (p3.z - p2.z);
          return out;
        };

        // === 4. INTERPOLACIÓN QUINTICA DE HERMITE C² PARA ACTIVACIONES ===
        // Proporciona continuidad perfecta en posición, velocidad y aceleración
        const quinticHermite = (t) => {
          // h(t) = t³(10 - 15t + 6t²) - C² continua
          const t2 = t * t;
          const t3 = t2 * t;
          return t3 * (10 - 15 * t + 6 * t2);
        };

        const quinticHermiteDerivative = (t) => {
          // h'(t) = 30t²(1-t)² - velocidad suave
          const t2 = t * t;
          const oneMinusT = 1 - t;
          return 30 * t2 * oneMinusT * oneMinusT;
        };

        // === 5. TABLA DE LOOKUP PARA SIN/COS - 100x MÁS RÁPIDO ===
        const SIN_TABLE_SIZE = 2048; // Mayor precisión
        const SIN_TABLE = new Float32Array(SIN_TABLE_SIZE);
        const COS_TABLE = new Float32Array(SIN_TABLE_SIZE);
        for (let i = 0; i < SIN_TABLE_SIZE; i++) {
          const angle = (i / SIN_TABLE_SIZE) * Math.PI * 2;
          SIN_TABLE[i] = Math.sin(angle);
          COS_TABLE[i] = Math.cos(angle);
        }

        const fastSin = (x) => {
          let idx = ((x % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
          idx = Math.floor((idx / (Math.PI * 2)) * SIN_TABLE_SIZE) & (SIN_TABLE_SIZE - 1);
          return SIN_TABLE[idx];
        };

        const fastCos = (x) => {
          let idx = ((x % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
          idx = Math.floor((idx / (Math.PI * 2)) * SIN_TABLE_SIZE) & (SIN_TABLE_SIZE - 1);
          return COS_TABLE[idx];
        };

        // === 6. LERP VECTORIAL OPTIMIZADO ===
        const _tempLerpVec = new THREE.Vector3();
        const lerpVector3 = (target, dest, factor, out) => {
          out.copy(target).lerp(dest, factor);
          return out;
        };

        // === 7. LERP ESCALAR OPTIMIZADO ===
        const lerp = (a, b, t) => a + (b - a) * t;
        
        // Lerp exponencial para suavidad natural
        const lerpExponential = (current, target, dt, smoothing = 10.0) => {
          const factor = 1.0 - Math.exp(-smoothing * dt);
          return current + (target - current) * factor;
        };

          packagerGroup.userData.coreMat.uniforms.uTime.value = time;
          packagerGroup.userData.coreMat.uniforms.uPulse.value = lerp(
            packagerGroup.userData.coreMat.uniforms.uPulse.value,
            0.0,
            dt * 8.0,
          );

          // Re-scale cage based on pulse
          const cageScale = 1.0 + packagerGroup.userData.pulse * 0.8;
          packagerGroup.userData.cage.scale.setScalar(cageScale);
          packagerGroup.userData.cage.rotation.y =
            time * 0.4 + packagerGroup.userData.pulse * 2.0;
          packagerGroup.userData.cage.rotation.z =
            time * 0.2 + packagerGroup.userData.pulse * 2.0;

          // Rotate rings
          const pulseFactor = 1.0 + packagerGroup.userData.pulse * 15.0;
          packagerGroup.userData.rings.forEach((ring, idx) => {
            ring.rotation.x += dt * (0.5 + idx * 0.2) * pulseFactor;
            ring.rotation.y += dt * (0.3 + idx * 0.4) * pulseFactor;
            ring.scale.setScalar(1.0 + packagerGroup.userData.pulse * 0.5);
          });

          for (let i = dataStreams.length - 1; i >= 0; i--) {
            const stream = dataStreams[i];
            if (stream.delay > 0) {
              stream.delay -= dt;
              continue;
            }
            if (!stream.active) {
              stream.active = true;
            }

            stream.progress += dt * 0.15;

            if (stream.progress >= 1.0 && !stream.hasFired) {
              stream.hasFired = true;
              if (stream.onComplete) stream.onComplete();
            }

            stream.material.uniforms.uTime.value = time;
            stream.material.uniforms.uFlowProgress.value = stream.progress;

            const sP = stream.startNode.position;
            const eP = stream.endNode.position;

            stream.material.uniforms.uStart.value.copy(sP);
            stream.material.uniforms.uEnd.value.copy(eP);

            _tempDir.subVectors(eP, sP).multiplyScalar(0.2);
            stream.material.uniforms.uControl1.value
              .copy(sP)
              .add(_upOffset)
              .add(_tempDir);
            stream.material.uniforms.uControl2.value
              .copy(eP)
              .add(_downOffset)
              .sub(_tempDir);

            if (stream.progress >= 1.8) {
              stream.mesh.visible = false;
              dataStreamPool.push({
                mesh: stream.mesh,
                material: stream.material,
              });
              dataStreams.splice(i, 1);
            }
          }

          renderer.render(scene, camera);
        }

        window.addEventListener("resize", () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
      } catch (err) {
        document.body.innerHTML +=
          '<div style="position:absolute;top:0;left:0;z-index:99999;color:red;background:white;padding:20px;font-family:monospace;white-space:pre-wrap;">' +
          err.stack +
          "</div>";
        console.error(err);
      }
    </script>
  </body>
</html>
